<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VT COA Mapping — QuickBooks → IES</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f4f0;--bg3:#edecea;
  --tx:#1a1a18;--tx2:#5a5a56;--tx3:#9a9a94;
  --bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.18);
  --rm:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;
  --tx:#e8e6e0;--tx2:#a0a09a;--tx3:#686862;
  --bd:rgba(255,255,255,.09);--bd2:rgba(255,255,255,.15);
}}
body{font-family:var(--font);background:var(--bg3);color:var(--tx);min-height:100vh;padding:20px 14px}
.page-hdr{max-width:1000px;margin:0 auto 14px}
.page-hdr h1{font-size:19px;font-weight:600;margin-bottom:3px;letter-spacing:-.3px}
.page-hdr p{font-size:12px;color:var(--tx2);line-height:1.5}
.card{max-width:1000px;margin:0 auto;background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bd);padding:16px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.controls select,.controls input{font-family:var(--font);font-size:12px;padding:5px 9px;border:.5px solid var(--bd2);border-radius:var(--rm);background:var(--bg);color:var(--tx);height:30px;outline:none}
.controls select{cursor:pointer;min-width:170px}
.controls input{flex:1;min-width:150px}
.controls select:focus,.controls input:focus{border-color:#534AB7}
.btn{font-family:var(--font);font-size:12px;padding:5px 10px;border:.5px solid var(--bd2);border-radius:var(--rm);background:var(--bg);color:var(--tx);cursor:pointer;height:30px;transition:background .15s}
.btn:hover{background:var(--bg2)}
.stats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.stat{background:var(--bg2);border-radius:var(--rm);padding:6px 11px;font-size:11px;color:var(--tx2);flex:1;min-width:88px}
.stat-val{font-size:15px;font-weight:600;color:var(--tx);display:block;margin-bottom:1px}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;align-items:center;color:var(--tx2)}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-q{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:#BA7517;color:#fff;font-size:8px;font-weight:700;flex-shrink:0}
.tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:.5px solid var(--bd)}
.tab-btn{font-family:var(--font);font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;border:none;background:none;color:var(--tx2);border-bottom:2.5px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab-bs{color:#042C53;border-bottom-color:#185FA5}
.tab-pl{color:#04342C;border-bottom-color:#1D9E75}
@media(prefers-color-scheme:dark){
  .tab-bs{color:#B5D4F4}
  .tab-pl{color:#9FE1CB}
}
.col-hdrs{display:grid;grid-template-columns:1fr 44px 1fr;margin-bottom:4px;padding:0 2px}
.col-hdrs span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3)}
.col-hdrs span:first-child{text-align:right;padding-right:8px}
.col-hdrs span:last-child{padding-left:8px}
.section-block{margin-bottom:4px;border:.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.section-hdr{padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);user-select:none;transition:background .12s}
.section-hdr:hover{background:var(--bg3)}
.section-content{display:none;padding:6px 8px;background:var(--bg)}
.section-content.open{display:block}
.mapping-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;margin:3px 0;min-height:30px}
.old-col{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.arrow-col{display:flex;align-items:stretch;justify-content:center}
.new-col{display:flex;align-items:center;align-self:center}
.old-pill{background:var(--bg2);border:.5px solid var(--bd);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--tx);display:flex;justify-content:space-between;align-items:center;gap:6px;width:100%}
.old-no{font-size:9px;font-weight:500;white-space:nowrap;flex-shrink:0}
.old-name{font-size:10px;line-height:1.3;text-align:right}
.new-pill{border-radius:6px;padding:4px 10px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:6px;min-height:28px;width:100%;border-width:1px;border-style:solid}
.new-no{font-size:9px;font-weight:400;white-space:nowrap;flex-shrink:0;opacity:.75}
.new-name{line-height:1.3}
.ct-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.note-q{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:#BA7517;color:#fff;font-size:8px;font-weight:700;flex-shrink:0;cursor:default;position:relative;margin-left:3px}
.note-q:hover .note-tip{display:block}
.note-tip{display:none;position:absolute;right:0;top:16px;background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--rm);padding:7px 9px;font-size:10px;color:var(--tx2);white-space:normal;width:260px;z-index:100;line-height:1.45;box-shadow:0 3px 10px rgba(0,0,0,.12);font-weight:400}
.empty{text-align:center;padding:32px;color:var(--tx3);font-size:13px}
</style>
</head>
<body>
<div class="page-hdr">
  <h1>VT Chart of Accounts Mapping — QuickBooks → IES</h1>
  <p>Venture Travel · Click a section to expand · Notes (?) appear inline</p>
</div>
<div class="card">
  <div class="controls">
    <select id="secF" onchange="render()">
      <option value="">All sections</option>
      <option>Bank</option>
<option>Accounts Receivable</option>
<option>Other Current Assets</option>
<option>Fixed Assets</option>
<option>Other Assets</option>
<option>Accounts Payable</option>
<option>Credit Cards</option>
<option>Other Current Liabilities</option>
<option>Long-Term Liabilities</option>
<option>Equity</option>
<option>Income</option>
<option>Cost of Goods Sold</option>
<option>Expenses</option>
<option>Other Income</option>
<option>Other Expense</option>

    </select>
    <select id="ctF" onchange="render()">
      <option value="">All change types</option>
      <option>Consolidated</option><option>Renamed</option>
      <option>Renumbered</option><option>Reclassified</option><option>New Account</option>
    </select>
    <input id="srch" type="text" placeholder="Search account name or number…" oninput="render()">
    <button class="btn" onclick="expandAll()">Expand all</button>
    <button class="btn" onclick="collapseAll()">Collapse all</button>
  </div>
  <div class="stats" id="statsBar"></div>
  <div class="legend">
    <span style="font-weight:600;margin-right:2px">Change type:</span>
    <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Consolidated</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Renamed</div>
    <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div>Renumbered</div>
    <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Reclassified</div>
    <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>New account</div>
    <div class="leg-item"><span class="leg-q">?</span><span style="margin-left:3px">Note / question</span></div>
  </div>
  <div class="tabs">
    <button class="tab-btn tab-bs" id="tab-bs" onclick="setTab('bs')">Balance Sheet</button>
    <button class="tab-btn" id="tab-pl" onclick="setTab('pl')">Income Statement</button>
  </div>
  <div class="col-hdrs"><span>QuickBooks (old)</span><span></span><span>IES (new)</span></div>
  <div id="container"></div>
</div>

  'Reclassified':{bg:'#FAEEDA',border:'#BA7517',text:'#412402',tag:'#BA7517',tagText:'#FAEEDA'},
  'New Account': {bg:'#EAF3DE',border:'#639922',text:'#173404',tag:'#639922',tagText:'#EAF3DE'},
};
let tab='bs';

function setTab(t){
  tab=t;
  document.getElementById('tab-bs').className='tab-btn'+(t==='bs'?' tab-bs':'');
  document.getElementById('tab-pl').className='tab-btn'+(t==='pl'?' tab-pl':'');
  rebuildSecFilter();
  render();
}

function noteQ(txt){
  if(!txt)return'';
  const e=txt.replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return`<span class="note-q">?<span class="note-tip">${e}</span></span>`;
}

function arrowSVG(n){
  const R=28,stroke='rgba(140,135,125,0.5)',arr='rgba(110,106,98,0.8)';
  const h=Math.max(R,n*R),mid=h/2;
  let p='';
  if(n<=1){
    p=`<line x1="4" y1="${mid}" x2="36" y2="${mid}" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round"/>
       <polyline points="30,${mid-4} 38,${mid} 30,${mid+4}" fill="none" stroke="${arr}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }else{
    for(let i=0;i<n;i++){
      const sy=i*R+R/2;
      p+=`<path d="M 4 ${sy} C 20 ${sy}, 30 ${mid}, 38 ${mid}" fill="none" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>`;
    }
    p+=`<polyline points="32,${mid-4} 40,${mid} 32,${mid+4}" fill="none" stroke="${arr}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  return`<svg width="44" height="${h}" viewBox="0 0 44 ${h}">${p}</svg>`;
}

function makeRow(acct){
  const olds=(acct.oldAccounts||[]);
  const real=olds.filter(o=>o.no);
  const n=Math.max(1,real.length);
  const col=COLORS[acct.changeType]||COLORS['Renumbered'];
  const row=document.createElement('div');row.className='mapping-row';

  const oc=document.createElement('div');oc.className='old-col';
  if(!real.length){
    oc.innerHTML=`<div style="width:100%;display:flex;justify-content:flex-end"><span style="font-size:10px;color:var(--tx3);font-style:italic;padding:3px 7px">— new account —</span></div>`;
  }else{
    real.forEach(o=>{
      const c2=COLORS[o.change]||COLORS['Renumbered'];
      const d=document.createElement('div');d.className='old-pill';
      d.innerHTML=`<span class="old-name">${o.name}</span><span style="display:flex;align-items:center;gap:2px"><span class="old-no" style="color:${c2.border}">${o.no}</span>${noteQ(o.note)}</span>`;
      oc.appendChild(d);
    });
    olds.filter(o=>!o.no&&o.note).forEach(o=>{
      const d=document.createElement('div');d.className='old-pill';
      d.innerHTML=`<span class="old-name" style="font-style:italic;color:var(--tx3)">— new account —</span>${noteQ(o.note)}`;
      oc.appendChild(d);
    });
  }

  const ac=document.createElement('div');ac.className='arrow-col';
  ac.innerHTML=arrowSVG(n);

  const nc=document.createElement('div');nc.className='new-col';
  const np=document.createElement('div');np.className='new-pill';
  np.style.cssText=`background:${col.bg};border-color:${col.border};color:${col.text}`;
  np.innerHTML=`<span class="new-no" style="color:${col.border}">${acct.newNo}</span><span class="new-name">${acct.newName}</span><span class="ct-tag" style="background:${col.tag};color:${col.tagText}">${acct.changeType}</span>`;
  nc.appendChild(np);

  row.appendChild(oc);row.appendChild(ac);row.appendChild(nc);
  return row;
}

function buildStats(tOld,tNew,byCt){
  const red=tOld>0?Math.round((1-tNew/tOld)*100):0;
  const chips=[
    ['Consolidated','#534AB7'],['Renamed','#1D9E75'],
    ['Renumbered','#185FA5'],['Reclassified','#BA7517'],['New Account','#639922']
  ].filter(([k])=>byCt[k]>0)
   .map(([k,c])=>`<div class="stat"><span class="stat-val" style="color:${c}">${byCt[k]}</span>${k}</div>`)
   .join('');
  document.getElementById('statsBar').innerHTML=
    `<div class="stat"><span class="stat-val">${tOld}</span>QB accounts</div>`+
    `<div class="stat"><span class="stat-val">${tNew}</span>IES accounts</div>`+
    `<div class="stat"><span class="stat-val">${red}%</span>reduction</div>`+chips;
}

function render(){
  const sf=document.getElementById('secF').value;
  const cf=document.getElementById('ctF').value;
  const q=(document.getElementById('srch').value||'').toLowerCase().trim();
  const data=tab==='bs'?BS:PL;
  const cont=document.getElementById('container');
  cont.innerHTML='';
  let tOld=0,tNew=0,byCt={},any=false;

  Object.entries(data).forEach(([sec,accts])=>{
    if(sf&&sf!==sec)return;
    const filt=accts.filter(a=>{
      if(cf&&a.changeType!==cf)return false;
      if(q){
        const inN=a.newNo.includes(q)||a.newName.toLowerCase().includes(q);
        const inO=(a.oldAccounts||[]).some(o=>(o.no&&o.no.includes(q))||(o.name&&o.name.toLowerCase().includes(q)));
        if(!inN&&!inO)return false;
      }
      return true;
    });
    if(!filt.length)return;
    any=true;
    let sOld=0;
    filt.forEach(a=>{
      const ro=(a.oldAccounts||[]).filter(o=>o.no).length;
      sOld+=ro;tOld+=ro;tNew++;
      byCt[a.changeType]=(byCt[a.changeType]||0)+1;
    });

    const blk=document.createElement('div');blk.className='section-block';
    const hdr=document.createElement('div');hdr.className='section-hdr';
    hdr.innerHTML=`<span>${sec}</span><span style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:var(--tx3)">${sOld} QB → ${filt.length} IES</span><span>▸</span></span>`;
    const cnt=document.createElement('div');cnt.className='section-content';
    filt.forEach(a=>cnt.appendChild(makeRow(a)));
    hdr.addEventListener('click',()=>{
      cnt.classList.toggle('open');
      hdr.querySelector('span:last-child span:last-child').textContent=cnt.classList.contains('open')?'▾':'▸';
    });
    blk.appendChild(hdr);blk.appendChild(cnt);cont.appendChild(blk);
  });

  if(!any){cont.innerHTML='<div class="empty">No accounts match the current filters.</div>';buildStats(0,0,{});}
  else buildStats(tOld,tNew,byCt);
}

function rebuildSecFilter(){
  const sel=document.getElementById('secF');
  const data=tab==='bs'?BS:PL;
  const cur=sel.value;
  sel.innerHTML='<option value="">All sections</option>';
  Object.keys(data).forEach(s=>{
    const o=document.createElement('option');
    o.value=s;o.textContent=s;
    if(s===cur)o.selected=true;
    sel.appendChild(o);
  });
}

function expandAll(){document.querySelectorAll('.section-content').forEach(c=>c.classList.add('open'));document.querySelectorAll('.section-hdr span:last-child span:last-child').forEach(a=>a.textContent='▾');}
function collapseAll(){document.querySelectorAll('.section-content').forEach(c=>c.classList.remove('open'));document.querySelectorAll('.section-hdr span:last-child span:last-child').forEach(a=>a.textContent='▸');}

render();
setTimeout(()=>{const f=document.querySelector('.section-content');if(f){f.classList.add('open');const a=f.previousElementSibling.querySelector('span:last-child span:last-child');if(a)a.textContent='▾';}},50);
</script>
</body>
</html>
